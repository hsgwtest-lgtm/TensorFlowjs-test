<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>HAND — 手の骨格検出</title>

  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="HAND"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0/dist/tf-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.10.0/dist/tf-converter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>

  <style>
    :root {
      --bg:     #0a0a0f;
      --thumb:  #ff6b6b;
      --index:  #4a9eff;
      --middle: #00e676;
      --ring:   #ff8c00;
      --pinky:  #c084fc;
      --palm:   #e0e0e0;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { width:100%; height:100dvh; overflow:hidden; background:var(--bg);
      font-family:'Helvetica Neue','Hiragino Sans',sans-serif; }

    #video  { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .5s; }
    #video.ready { opacity:1; }
    #canvas { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:5; }

    /* ── Top bar ── */
    #topbar {
      position:fixed; top:0; left:0; right:0; z-index:20;
      padding:calc(var(--safe-t) + 6px) 14px 6px;
      display:flex; align-items:center; gap:8px;
      background:linear-gradient(rgba(10,10,15,0.85),transparent);
    }
    .logo { font-size:15px; font-weight:700; letter-spacing:4px; color:#fff; }
    .sub  { font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:2px; margin-left:-4px; }
    .spacer { flex:1; }
    #cam-btn {
      background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2);
      color:#fff; font-size:16px; padding:4px 10px; cursor:pointer; border-radius:6px; line-height:1;
    }
    #fps-box {
      font-size:11px; color:rgba(255,255,255,0.6); padding:3px 8px;
      border:1px solid rgba(255,255,255,0.15); border-radius:4px;
      font-family:'Courier New',monospace; letter-spacing:1px;
    }
    #status-dot { width:8px; height:8px; border-radius:50%; background:#00e676; box-shadow:0 0 6px #00e676; animation:blink 1.5s infinite; }
    #status-dot.loading { background:#ffb800; box-shadow:0 0 6px #ffb800; }
    #status-dot.error   { background:#ff3a3a; box-shadow:0 0 6px #ff3a3a; animation:none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Hand score badges ── */
    #badges { position:fixed; top:calc(var(--safe-t)+52px); left:12px; z-index:20; display:none; flex-direction:column; gap:8px; }
    #badges.show { display:flex; }
    .badge {
      width:76px; height:68px;
      background:rgba(0,188,212,0.18);
      border:1.5px solid rgba(0,188,212,0.65);
      clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    .badge .bval  { font-size:18px; font-weight:700; color:#fff; line-height:1; }
    .badge .blbl  { font-size:9px;  color:rgba(0,188,212,0.9); letter-spacing:1px; margin-top:2px; }
    .badge .bhand { font-size:9px;  color:rgba(255,255,255,0.6); letter-spacing:1px; }

    /* ── Right info panel (finger angles) ── */
    #info-panel { position:fixed; top:50%; right:10px; z-index:20; transform:translateY(-50%);
      display:none; flex-direction:column; gap:4px; }
    #info-panel.show { display:flex; }
    .info-section {
      background:rgba(10,10,15,0.75); border:1px solid rgba(255,255,255,0.12);
      border-radius:7px; padding:5px 8px; font-size:10px;
      color:rgba(255,255,255,0.6); letter-spacing:.4px; white-space:nowrap; text-align:right;
    }
    .info-section .sec-title { font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:1px; margin-bottom:2px; }
    .info-section .row { display:flex; justify-content:space-between; gap:10px; }
    .info-section .row .lbl { color:rgba(255,255,255,0.45); }
    .info-section .row .val { color:#fff; font-weight:700; min-width:36px; text-align:right; }
    .t-color { color:var(--thumb)!important; }
    .i-color { color:var(--index)!important; }
    .m-color { color:var(--middle)!important; }
    .r-color { color:var(--ring)!important; }
    .p-color { color:var(--pinky)!important; }

    /* ── Bottom bar ── */
    #bottom { position:fixed; bottom:0; left:0; right:0; z-index:20;
      padding:8px 14px calc(var(--safe-b)+10px);
      background:linear-gradient(transparent,rgba(10,10,15,0.88));
      display:none; flex-direction:column; gap:3px; }
    #bottom.show { display:flex; }
    .brow { font-size:11px; color:rgba(255,255,255,0.5); letter-spacing:1px; text-align:center; }
    .brow span { font-weight:700; color:#fff; }
    .legend-row { display:flex; justify-content:center; gap:12px; margin-top:2px; }
    .leg-item { font-size:9px; display:flex; align-items:center; gap:4px; color:rgba(255,255,255,0.5); }
    .leg-dot  { width:7px; height:7px; border-radius:50%; }

    /* ── Crosshair ── */
    #crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:6; }
    .ch-h { position:absolute; top:50%; left:-14px; right:-14px; height:1.5px; transform:translateY(-50%); background:rgba(255,255,255,0.4); }
    .ch-v { position:absolute; left:50%; top:-14px; bottom:-14px; width:1.5px; transform:translateX(-50%); background:rgba(255,255,255,0.4); }

    /* ── Splash ── */
    #splash { position:fixed; inset:0; z-index:100; background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:40px; }
    #splash h1 { font-size:28px; letter-spacing:8px; color:#fff; font-weight:300; }
    #splash p  { font-size:12px; letter-spacing:2px; color:rgba(255,255,255,0.4); text-align:center; line-height:1.8; }
    #prog-wrap { width:200px; height:2px; background:rgba(255,255,255,0.1); }
    #prog-bar  { height:100%; width:0%; background:#00bcd4; transition:width .3s; }
    #splash-msg { font-size:11px; color:rgba(255,255,255,0.45); letter-spacing:2px; }
    #start-btn { display:none; padding:12px 36px; border:1px solid rgba(255,255,255,0.3);
      background:rgba(255,255,255,0.06); color:#fff; font-size:13px; letter-spacing:4px;
      cursor:pointer; border-radius:4px; font-family:inherit; }
    #start-btn.show { display:block; }
    .hand-icon { font-size:48px; filter:drop-shadow(0 0 16px rgba(0,188,212,0.5)); }

    /* ── Perm ── */
    #perm { display:none; position:fixed; inset:0; z-index:101; background:var(--bg);
      flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:40px; text-align:center; }
    #perm.show { display:flex; }
    #perm .icon { font-size:50px; }
    #perm p { font-size:13px; color:rgba(255,255,255,0.6); line-height:1.8; }
    #perm-btn { padding:13px 38px; border:1px solid rgba(255,255,255,0.3);
      background:rgba(255,255,255,0.08); color:#fff; font-family:inherit;
      font-size:13px; letter-spacing:3px; cursor:pointer; border-radius:4px; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted webkit-playsinline></video>
<canvas id="canvas"></canvas>
<div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">HAND</div>
  <div class="sub">骨格検出</div>
  <div class="spacer"></div>
  <button id="cam-btn">⟳</button>
  <div id="fps-box">-- FPS</div>
  <div id="status-dot" class="loading"></div>
</div>

<!-- Left: open score badges -->
<div id="badges">
  <div class="badge" id="badge-0">
    <div class="bval" id="score-val-0">--</div>
    <div class="blbl">開き度</div>
    <div class="bhand" id="hand-label-0">--</div>
  </div>
  <div class="badge" id="badge-1" style="display:none;">
    <div class="bval" id="score-val-1">--</div>
    <div class="blbl">開き度</div>
    <div class="bhand" id="hand-label-1">--</div>
  </div>
</div>

<!-- Right: finger angle panel -->
<div id="info-panel">
  <div class="info-section">
    <div class="sec-title">指関節角度 (Hand 1)</div>
    <div class="row"><span class="lbl t-color">親指</span><span class="val" id="a-thumb">--/--°</span></div>
    <div class="row"><span class="lbl i-color">人差指</span><span class="val" id="a-index">--/--/--°</span></div>
    <div class="row"><span class="lbl m-color">中指</span><span class="val" id="a-middle">--/--/--°</span></div>
    <div class="row"><span class="lbl r-color">薬指</span><span class="val" id="a-ring">--/--/--°</span></div>
    <div class="row"><span class="lbl p-color">小指</span><span class="val" id="a-pinky">--/--/--°</span></div>
  </div>
  <div class="info-section" id="spread-panel">
    <div class="sec-title">指開き角度</div>
    <div class="row"><span class="lbl">T-I</span><span class="val" id="sp-ti">--°</span></div>
    <div class="row"><span class="lbl">I-M</span><span class="val" id="sp-im">--°</span></div>
    <div class="row"><span class="lbl">M-R</span><span class="val" id="sp-mr">--°</span></div>
    <div class="row"><span class="lbl">R-P</span><span class="val" id="sp-rp">--°</span></div>
  </div>
</div>

<!-- Bottom bar -->
<div id="bottom">
  <div class="brow" id="hand-info">手を検出中…</div>
  <div class="brow">手首角 <span id="v-wrist">--°</span> &nbsp;|&nbsp; 掌傾き <span id="v-palm">--°</span> &nbsp;|&nbsp; 指の合計屈曲 <span id="v-total">--°</span></div>
  <div class="legend-row">
    <div class="leg-item"><div class="leg-dot" style="background:var(--thumb)"></div>親指</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--index)"></div>人差指</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--middle)"></div>中指</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--ring)"></div>薬指</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--pinky)"></div>小指</div>
  </div>
</div>

<!-- Splash -->
<div id="splash">
  <div class="hand-icon">🖐</div>
  <h1>HAND</h1>
  <p>手の骨格検出 · 21点 · リアルタイム<br>MediaPipe Hands</p>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="splash-msg">モデルを読み込み中…</div>
  <button id="start-btn">▶ カメラ起動</button>
</div>

<div id="perm">
  <div class="icon">📷</div>
  <p>カメラへのアクセスが必要です<br>次の画面で「許可」を選択してください</p>
  <button id="perm-btn">アクセスを許可</button>
</div>

<script>
(function(){
  /*
   * MediaPipe Hands 21 landmarks:
   *  0=WRIST
   *  1=THUMB_CMC  2=THUMB_MCP  3=THUMB_IP   4=THUMB_TIP
   *  5=INDEX_MCP  6=INDEX_PIP  7=INDEX_DIP  8=INDEX_TIP
   *  9=MIDDLE_MCP 10=MIDDLE_PIP 11=MIDDLE_DIP 12=MIDDLE_TIP
   * 13=RING_MCP  14=RING_PIP  15=RING_DIP  16=RING_TIP
   * 17=PINKY_MCP 18=PINKY_PIP 19=PINKY_DIP 20=PINKY_TIP
   */

  // Finger color palette
  const C = {
    palm:   '#e0e0e0',
    thumb:  '#ff6b6b',
    index:  '#4a9eff',
    middle: '#00e676',
    ring:   '#ff8c00',
    pinky:  '#c084fc',
  };

  // Skeleton connections: [from, to, color]
  const CONNECTIONS = [
    // Palm
    [0,1,C.thumb],[0,5,C.index],[0,17,C.pinky],
    [5,9,C.palm],[9,13,C.palm],[13,17,C.palm],
    // Thumb
    [1,2,C.thumb],[2,3,C.thumb],[3,4,C.thumb],
    // Index
    [5,6,C.index],[6,7,C.index],[7,8,C.index],
    // Middle
    [9,10,C.middle],[10,11,C.middle],[11,12,C.middle],
    // Ring
    [13,14,C.ring],[14,15,C.ring],[15,16,C.ring],
    // Pinky
    [17,18,C.pinky],[18,19,C.pinky],[19,20,C.pinky],
  ];

  // Joint dot colors by index
  function dotColor(i){
    if(i===0) return C.palm;
    if(i<=4)  return C.thumb;
    if(i<=8)  return C.index;
    if(i<=12) return C.middle;
    if(i<=16) return C.ring;
    return C.pinky;
  }

  // ── Math helpers ──
  function angle3(a, m, b){
    if(!a||!m||!b) return null;
    const ax=a.x-m.x, ay=a.y-m.y;
    const bx=b.x-m.x, by=b.y-m.y;
    const la=Math.sqrt(ax*ax+ay*ay), lb=Math.sqrt(bx*bx+by*by);
    if(!la||!lb) return null;
    return Math.round(Math.acos(Math.max(-1,Math.min(1,(ax*bx+ay*by)/(la*lb))))*180/Math.PI);
  }

  function dist2d(a,b){
    const dx=a.x-b.x, dy=a.y-b.y;
    return Math.sqrt(dx*dx+dy*dy);
  }

  function angleBetweenDirs(a0,a1, b0,b1){
    // angle between two line directions
    const ax=a1.x-a0.x, ay=a1.y-a0.y;
    const bx=b1.x-b0.x, by=b1.y-b0.y;
    const la=Math.sqrt(ax*ax+ay*ay), lb=Math.sqrt(bx*bx+by*by);
    if(!la||!lb) return null;
    return Math.round(Math.acos(Math.max(-1,Math.min(1,(ax*bx+ay*by)/(la*lb))))*180/Math.PI);
  }

  // Open score: average tip-to-wrist distance / palm width
  function openScore(lm){
    const palmW = dist2d(lm[0], lm[5]);
    if(!palmW) return 0;
    const tips=[4,8,12,16,20];
    let sum=0;
    tips.forEach(t=>{ sum+=dist2d(lm[0],lm[t]); });
    return Math.min(100, Math.round((sum/tips.length)/palmW*50));
  }

  // Wrist angle (0→5→9 triangle base)
  function wristAngle(lm){
    return angle3(lm[5], lm[0], lm[17]);
  }

  // Palm tilt: angle of wrist→middle-mcp relative to vertical
  function palmTilt(lm){
    const dx=lm[9].x-lm[0].x, dy=lm[9].y-lm[0].y;
    return Math.round(Math.atan2(dx,dy)*180/Math.PI);
  }

  // ── Detector state ──
  let detector=null, stream=null, animId=null, running=false;
  let facingMode='user', lastTime=0, fpsArr=[];

  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  // ── Load model ──
  async function loadModel(){
    const bar=document.getElementById('prog-bar');
    const msg=document.getElementById('splash-msg');
    bar.style.width='10%'; msg.textContent='TensorFlow初期化中…';
    await tf.setBackend('webgl'); await tf.ready();
    bar.style.width='40%'; msg.textContent='MediaPipe Handsを読み込み中…';
    const model = handPoseDetection.SupportedModels.MediaPipeHands;
    detector = await handPoseDetection.createDetector(model, {
      runtime: 'tfjs',
      modelType: 'full',
      maxHands: 2,
    });
    bar.style.width='90%'; msg.textContent='準備完了 — 21点×2手';
    await new Promise(r=>setTimeout(r,400));
    bar.style.width='100%';
    await new Promise(r=>setTimeout(r,150));
    document.getElementById('start-btn').classList.add('show');
    msg.textContent='タップして開始';
  }

  // ── Camera ──
  async function startCamera(){
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:facingMode}, width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    video.srcObject=stream;
    await new Promise(r=>{ video.onloadedmetadata=r; });
    video.play(); resizeCanvas(); video.classList.add('ready');
  }

  function resizeCanvas(){
    canvas.width  = video.videoWidth  || window.innerWidth;
    canvas.height = video.videoHeight || window.innerHeight;
  }

  // ── Main loop ──
  async function loop(){
    if(!running) return;
    const now=performance.now(), dt=now-lastTime; lastTime=now;
    if(dt>0){
      fpsArr.push(1000/dt); if(fpsArr.length>8) fpsArr.shift();
      document.getElementById('fps-box').textContent=
        Math.round(fpsArr.reduce((a,b)=>a+b)/fpsArr.length)+' FPS';
    }
    let hands=[];
    try{ hands=await detector.estimateHands(video,{flipHorizontal: facingMode==='user'}); }catch(e){}
    draw(hands);
    animId=requestAnimationFrame(loop);
  }

  // ── Draw ──
  function draw(hands){
    const vw=video.videoWidth, vh=video.videoHeight;
    if(!vw||!vh) return;
    if(canvas.width!==vw||canvas.height!==vh) resizeCanvas();
    ctx.clearRect(0,0,vw,vh);

    const badges  = document.getElementById('badges');
    const infoP   = document.getElementById('info-panel');
    const bottomB = document.getElementById('bottom');
    const badge1  = document.getElementById('badge-1');

    if(!hands.length){
      badges.classList.remove('show');
      infoP.classList.remove('show');
      bottomB.classList.remove('show');
      document.getElementById('hand-info').textContent='手をかざしてください 👋';
      return;
    }

    badges.classList.add('show');
    infoP.classList.add('show');
    bottomB.classList.add('show');
    badge1.style.display = hands.length > 1 ? 'flex' : 'none';

    hands.forEach((hand, hi)=>{
      const lm = hand.keypoints; // array of {x,y,name}
      const handedness = hand.handedness; // 'Left' or 'Right'

      // ── Draw connections ──
      ctx.lineCap='round';
      CONNECTIONS.forEach(([i,j,col])=>{
        const a=lm[i], b=lm[j];
        if(!a||!b) return;
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=col; ctx.lineWidth=3.5;
        ctx.shadowColor=col; ctx.shadowBlur=6; ctx.stroke(); ctx.shadowBlur=0;
      });

      // ── Draw joints ──
      lm.forEach((p,i)=>{
        if(!p) return;
        const col=dotColor(i);
        const r = (i===0) ? 7 : (i%4===0) ? 6 : 4; // tip & wrist bigger
        ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
        ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
        ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
        ctx.strokeStyle='rgba(255,255,255,0.65)'; ctx.lineWidth=1.5; ctx.stroke();
      });

      // ── Angle labels on canvas ──
      ctx.font='bold 12px "Helvetica Neue",sans-serif';
      ctx.textBaseline='middle';

      function canvasLabel(pt, text, col){
        if(!pt||text===null) return;
        const x=pt.x+8, y=pt.y-10;
        const w=ctx.measureText(text).width+8;
        ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(x-4,y-9,w,18);
        ctx.fillStyle=col; ctx.fillText(text,x,y);
      }

      // Per-finger joint angles
      // Thumb: CMC(1) angle, IP(3) angle
      const tCMC = angle3(lm[0],lm[1],lm[2]);
      const tIP  = angle3(lm[2],lm[3],lm[4]);
      canvasLabel(lm[2], tCMC!==null?tCMC+'°':null, C.thumb);
      canvasLabel(lm[3], tIP!==null?tIP+'°':null, C.thumb);

      // Index: MCP(5), PIP(6), DIP(7)
      const iMCP=angle3(lm[0],lm[5],lm[6]), iPIP=angle3(lm[5],lm[6],lm[7]), iDIP=angle3(lm[6],lm[7],lm[8]);
      canvasLabel(lm[6], iPIP!==null?iPIP+'°':null, C.index);
      canvasLabel(lm[7], iDIP!==null?iDIP+'°':null, C.index);

      // Middle
      const mMCP=angle3(lm[0],lm[9],lm[10]), mPIP=angle3(lm[9],lm[10],lm[11]), mDIP=angle3(lm[10],lm[11],lm[12]);
      canvasLabel(lm[10], mPIP!==null?mPIP+'°':null, C.middle);
      canvasLabel(lm[11], mDIP!==null?mDIP+'°':null, C.middle);

      // Ring
      const rMCP=angle3(lm[0],lm[13],lm[14]), rPIP=angle3(lm[13],lm[14],lm[15]), rDIP=angle3(lm[14],lm[15],lm[16]);
      canvasLabel(lm[14], rPIP!==null?rPIP+'°':null, C.ring);
      canvasLabel(lm[15], rDIP!==null?rDIP+'°':null, C.ring);

      // Pinky
      const pMCP=angle3(lm[0],lm[17],lm[18]), pPIP=angle3(lm[17],lm[18],lm[19]), pDIP=angle3(lm[18],lm[19],lm[20]);
      canvasLabel(lm[18], pPIP!==null?pPIP+'°':null, C.pinky);
      canvasLabel(lm[19], pDIP!==null?pDIP+'°':null, C.pinky);

      // Handedness label near wrist
      ctx.font='bold 14px "Helvetica Neue",sans-serif';
      const hLabel = handedness==='Left' ? '左手' : '右手';
      const hw=ctx.measureText(hLabel).width+10;
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(lm[0].x-hw/2-5, lm[0].y+14, hw, 20);
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.textBaseline='top'; ctx.fillText(hLabel, lm[0].x-hw/2, lm[0].y+15);
      ctx.textBaseline='middle';

      // ── Score & spread ──
      const open = openScore(lm);
      const wAng = wristAngle(lm);
      const tilt  = palmTilt(lm);

      // Finger spread angles between adjacent MCP axes
      const spTI = angleBetweenDirs(lm[0],lm[2], lm[0],lm[5]);
      const spIM = angleBetweenDirs(lm[0],lm[5], lm[0],lm[9]);
      const spMR = angleBetweenDirs(lm[0],lm[9], lm[0],lm[13]);
      const spRP = angleBetweenDirs(lm[0],lm[13], lm[0],lm[17]);

      // Total bend (sum of PIP angles deviation from 180)
      let totalBend=0;
      [iPIP,mPIP,rPIP,pPIP].forEach(a=>{ if(a!==null) totalBend+=Math.abs(180-a); });

      // ── DOM update for first hand ──
      if(hi===0){
        document.getElementById('score-val-0').textContent = open;
        document.getElementById('hand-label-0').textContent = handedness==='Left'?'左手':'右手';
        function fmtFinger(a,b,c){ return [a,b,c].map(v=>v!==null?v+'°':'--').join('/'); }
        document.getElementById('a-thumb').textContent  = (tCMC!==null?tCMC:'--')+'/'+(tIP!==null?tIP:'--')+'°';
        document.getElementById('a-index').textContent  = fmtFinger(iMCP,iPIP,iDIP);
        document.getElementById('a-middle').textContent = fmtFinger(mMCP,mPIP,mDIP);
        document.getElementById('a-ring').textContent   = fmtFinger(rMCP,rPIP,rDIP);
        document.getElementById('a-pinky').textContent  = fmtFinger(pMCP,pPIP,pDIP);
        document.getElementById('sp-ti').textContent = spTI!==null?spTI+'°':'--°';
        document.getElementById('sp-im').textContent = spIM!==null?spIM+'°':'--°';
        document.getElementById('sp-mr').textContent = spMR!==null?spMR+'°':'--°';
        document.getElementById('sp-rp').textContent = spRP!==null?spRP+'°':'--°';
        document.getElementById('v-wrist').textContent = wAng!==null?wAng+'°':'--°';
        document.getElementById('v-palm').textContent  = tilt!==null?tilt+'°':'--°';
        document.getElementById('v-total').textContent = totalBend?Math.round(totalBend)+'°':'--°';
      }
      if(hi===1){
        document.getElementById('score-val-1').textContent = open;
        document.getElementById('hand-label-1').textContent = handedness==='Left'?'左手':'右手';
      }
    });

    // Hand info bar
    const labels = hands.map(h=>h.handedness==='Left'?'左手':'右手');
    document.getElementById('hand-info').textContent =
      labels.join(' + ') + ' 検出中 (' + hands.length + '手)';
  }

  // ── Controls ──
  document.getElementById('cam-btn').addEventListener('click', async()=>{
    facingMode = facingMode==='environment'?'user':'environment';
    if(running){
      cancelAnimationFrame(animId);
      await startCamera();
      lastTime=0; fpsArr=[];
      animId=requestAnimationFrame(loop);
    }
  });

  document.getElementById('start-btn').addEventListener('click',()=>{
    document.getElementById('splash').style.display='none';
    document.getElementById('perm').classList.add('show');
  });

  document.getElementById('perm-btn').addEventListener('click', async()=>{
    document.getElementById('perm').classList.remove('show');
    try{
      await startCamera(); running=true;
      document.getElementById('status-dot').classList.remove('loading');
      lastTime=performance.now(); animId=requestAnimationFrame(loop);
    }catch(e){
      document.getElementById('status-dot').classList.add('error');
      document.querySelector('#perm p').textContent='カメラへのアクセスが拒否されました。\nSafari設定 → プライバシー → カメラ を確認してください。';
      document.getElementById('perm').classList.add('show');
    }
  });

  window.addEventListener('resize', resizeCanvas);
  if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

  loadModel().catch(e=>{
    document.getElementById('splash-msg').textContent='モデルの読み込みに失敗しました';
    document.getElementById('status-dot').classList.add('error');
    console.error(e);
  });
})();
</script>
</body>
</html>
