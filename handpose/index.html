<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --c-thumb:#ff4dff;
  --c-index:#4d9fff;
  --c-middle:#4dff88;
  --c-ring:#ffe04d;
  --c-pinky:#c44dff;
  --panel:rgba(8,8,8,0.80);
  --border:rgba(255,255,255,0.13);
  --text:#fff;
  --sub:rgba(255,255,255,0.55);
  --mono:'SF Mono','Fira Code','Courier New',monospace;
  --ui:-apple-system,'Hiragino Sans',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

html,body{
  width:100%;height:100%;
  background:#000;overflow:hidden;
  font-family:var(--ui);color:var(--text);
  -webkit-user-select:none;user-select:none;
  touch-action:none;
}

/* ── CAMERA LAYER ── */
#app{position:relative;width:100vw;height:100dvh;overflow:hidden}

video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  transform:scaleX(-1);    /* front cam mirror */
}

#canvas-overlay{
  position:absolute;inset:0;
  width:100%;height:100%;
  transform:scaleX(-1);    /* mirror matches video */
  pointer-events:none;
}

/* ── TOP BAR ── */
#top-bar{
  position:absolute;
  top:calc(var(--safe-top) + 10px);
  left:0;right:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:0 14px;
  z-index:20;
  pointer-events:none;
}

#logo-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:8px 14px 6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
#logo-box .letters{
  display:flex;align-items:center;gap:1px;
  font-size:14px;font-weight:800;letter-spacing:3px;
}
#logo-box .letters .h{color:var(--sub)}
#logo-box .letters .a{color:var(--c-index)}
#logo-box .letters .n{color:var(--c-middle)}
#logo-box .letters .d{color:var(--c-ring)}
#logo-box .emoji{font-size:20px;line-height:1}
#logo-box .gesture-lbl{font-size:11px;color:var(--sub);margin-top:1px}

#fps-box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 12px;
  display:flex;align-items:center;gap:5px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:#4dff88;box-shadow:0 0 7px #4dff88;
  animation:blink 1.6s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#fps-num{font-family:var(--mono);font-size:14px;font-weight:700}
.fps-unit{font-size:11px;color:var(--sub)}

/* ── RIGHT PANEL ── */
#right-panel{
  position:absolute;
  right:10px;top:50%;
  transform:translateY(-50%);
  display:flex;flex-direction:column;gap:5px;
  z-index:20;pointer-events:none;
}

.fcard{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:11px;
  padding:6px 10px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  min-width:172px;
}
.fcard .fname{
  font-size:9.5px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:4px;
}
.fcard.thumb .fname{color:var(--c-thumb)}
.fcard.index .fname{color:var(--c-index)}
.fcard.middle .fname{color:var(--c-middle)}
.fcard.ring .fname{color:var(--c-ring)}
.fcard.pinky .fname{color:var(--c-pinky)}

.fcard .fangles{
  font-family:var(--mono);font-size:11px;
  color:var(--sub);
  display:flex;flex-wrap:wrap;gap:5px 8px;
}
.fcard .fangles span{white-space:nowrap}
.fcard .fangles b{color:var(--text);font-weight:700}

/* ── BOTTOM BAR ── */
#bottom-bar{
  position:absolute;
  bottom:calc(var(--safe-bot) + 8px);
  left:0;right:0;
  display:flex;flex-direction:column;gap:5px;
  padding:0 10px;
  z-index:20;pointer-events:none;
}

.bcard{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:13px;
  padding:8px 14px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
#open-row{display:flex;align-items:center;gap:12px}
.stat{display:flex;align-items:baseline;gap:4px}
.stat .lbl{font-size:10px;color:var(--sub);letter-spacing:.3px}
.stat .val{font-family:var(--mono);font-size:15px;font-weight:700}
.divider{width:1px;height:18px;background:var(--border)}

#spread-row{display:flex;justify-content:space-around;align-items:center}
.sitem{display:flex;flex-direction:column;align-items:center;gap:1px}
.sitem .slbl{font-size:9px;color:var(--sub)}
.sitem .sval{font-family:var(--mono);font-size:12px;font-weight:700}

/* ── SAVE BUTTON ── */
#save-btn{
  position:absolute;
  bottom:calc(var(--safe-bot) + 130px);
  left:50%;transform:translateX(-50%);
  z-index:25;pointer-events:all;
  background:rgba(255,255,255,0.12);
  border:1.5px solid rgba(255,255,255,0.28);
  border-radius:50%;
  width:60px;height:60px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  transition:transform .12s,background .12s;
}
#save-btn:active{transform:translateX(-50%) scale(.88);background:rgba(255,255,255,0.25)}
#save-btn svg{width:26px;height:26px;fill:#fff;opacity:.9}

/* ── HAND LABEL (DOM floating) ── */
#hand-tag{
  position:absolute;
  font-size:18px;font-weight:800;
  text-shadow:0 2px 8px rgba(0,0,0,.9);
  pointer-events:none;z-index:18;
  display:none;transition:left .08s,top .08s;
}

/* ── LOADING / START ── */
#overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.93);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;z-index:99;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
#overlay .hero{font-size:64px;line-height:1}
#overlay h1{
  font-size:26px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(90deg,var(--c-index),var(--c-middle),var(--c-ring));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#overlay p{
  font-size:13px;color:var(--sub);
  text-align:center;line-height:1.7;
  padding:0 28px;max-width:300px;
}
#start-btn{
  background:linear-gradient(135deg,var(--c-index),var(--c-pinky));
  border:none;border-radius:50px;
  padding:14px 42px;
  font-size:15px;font-weight:800;color:#fff;
  letter-spacing:.8px;cursor:pointer;
  box-shadow:0 0 32px rgba(77,159,255,.35);
  transition:transform .13s,box-shadow .13s;
}
#start-btn:active{transform:scale(.94);box-shadow:0 0 12px rgba(77,159,255,.15)}

#loading-msg{
  font-size:12px;color:var(--sub);
  display:none;text-align:center;
}

/* ── TOAST ── */
#toast{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(77,255,136,.15);
  border:1px solid rgba(77,255,136,.4);
  border-radius:12px;
  padding:12px 22px;
  font-size:14px;font-weight:700;
  color:#4dff88;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  z-index:50;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}
</style>
</head>

<div id="app">

<!-- MediaPipe Tasks Vision (WASM – iOS Safari stable) -->
<script type="module">
// ── Import MediaPipe Tasks Vision ──────────────────────────────────────────
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js";

// ── CONSTANTS ──────────────────────────────────────────────────────────────
const COLOR = {
  thumb:  '#ff4dff',
  index:  '#4d9fff',
  middle: '#4dff88',
  ring:   '#ffe04d',
  pinky:  '#c44dff',
};

// MediaPipe HandLandmarker landmark index map
const L = {
  WRIST:0,
  T_CMC:1,T_MCP:2,T_IP:3,T_TIP:4,
  I_MCP:5,I_PIP:6,I_DIP:7,I_TIP:8,
  M_MCP:9,M_PIP:10,M_DIP:11,M_TIP:12,
  R_MCP:13,R_PIP:14,R_DIP:15,R_TIP:16,
  P_MCP:17,P_PIP:18,P_DIP:19,P_TIP:20,
};

const FINGER_CHAINS = {
  thumb:  [L.WRIST,L.T_CMC,L.T_MCP,L.T_IP,L.T_TIP],
  index:  [L.WRIST,L.I_MCP,L.I_PIP,L.I_DIP,L.I_TIP],
  middle: [L.WRIST,L.M_MCP,L.M_PIP,L.M_DIP,L.M_TIP],
  ring:   [L.WRIST,L.R_MCP,L.R_PIP,L.R_DIP,L.R_TIP],
  pinky:  [L.WRIST,L.P_MCP,L.P_PIP,L.P_DIP,L.P_TIP],
};

const PALM_RING = [L.WRIST,L.I_MCP,L.M_MCP,L.R_MCP,L.P_MCP,L.WRIST];

const GESTURES = {
  open:'バー',fist:'グー',peace:'ピース',
  point:'指差し',thumbUp:'グッド',other:'---',
};

// ── DOM ────────────────────────────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas-overlay');
const ctx       = canvas.getContext('2d');
const handTag   = document.getElementById('hand-tag');
const overlayEl = document.getElementById('overlay');
const loadMsg   = document.getElementById('loading-msg');

// ── STATE ──────────────────────────────────────────────────────────────────
let landmarker  = null;
let rafId       = null;
let lastTime    = -1;
let fpsSmooth   = 0;
let lastT       = performance.now();

// ── MATH ───────────────────────────────────────────────────────────────────
function angle3(A,B,C){
  const ax=A.x-B.x,ay=A.y-B.y,az=(A.z||0)-(B.z||0);
  const cx=C.x-B.x,cy=C.y-B.y,cz=(C.z||0)-(B.z||0);
  const dot=ax*cx+ay*cy+az*cz;
  const ma=Math.sqrt(ax*ax+ay*ay+az*az);
  const mc=Math.sqrt(cx*cx+cy*cy+cz*cz);
  if(!ma||!mc) return 180;
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/(ma*mc))))*180/Math.PI);
}

function spreadAng(tA,tB,w){
  const ax=tA.x-w.x,ay=tA.y-w.y;
  const bx=tB.x-w.x,by=tB.y-w.y;
  const dot=ax*bx+ay*by;
  const ma=Math.sqrt(ax*ax+ay*ay),mb=Math.sqrt(bx*bx+by*by);
  if(!ma||!mb) return 0;
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/(ma*mb))))*180/Math.PI);
}

function wristAng(w,im){
  return Math.round(Math.atan2(im.y-w.y,im.x-w.x)*180/Math.PI);
}

function openness(lm){
  const w=lm[L.WRIST];
  const ref=Math.hypot(lm[L.M_MCP].x-w.x,lm[L.M_MCP].y-w.y)*2||1;
  const tips=[L.T_TIP,L.I_TIP,L.M_TIP,L.R_TIP,L.P_TIP];
  const sum=tips.reduce((s,i)=>s+Math.hypot(lm[i].x-w.x,lm[i].y-w.y),0);
  return Math.min(100,Math.round(sum/tips.length/ref*100));
}

function gesture(lm){
  const w=lm[L.WRIST];
  const isOpen=i=>{
    const tip=lm[i],base=lm[i-3>=0?i-3:L.T_CMC];
    return Math.hypot(tip.x-w.x,tip.y-w.y)>
           Math.hypot(base.x-w.x,base.y-w.y)*0.75;
  };
  const th=isOpen(L.T_TIP),ix=isOpen(L.I_TIP),
        mi=isOpen(L.M_TIP),ri=isOpen(L.R_TIP),pi=isOpen(L.P_TIP);
  if(th&&ix&&mi&&ri&&pi) return GESTURES.open;
  if(!th&&!ix&&!mi&&!ri&&!pi) return GESTURES.fist;
  if(!th&&ix&&mi&&!ri&&!pi) return GESTURES.peace;
  if(!th&&ix&&!mi&&!ri&&!pi) return GESTURES.point;
  if(th&&!ix&&!mi&&!ri&&!pi) return GESTURES.thumbUp;
  return GESTURES.other;
}

// ── DRAW ───────────────────────────────────────────────────────────────────
function px(lm){ return {x: lm.x * canvas.width, y: lm.y * canvas.height}; }

function drawHand(landmarks, handedness){
  ctx.save();

  // Palm ring
  ctx.beginPath();
  PALM_RING.forEach((i,n)=>{
    const p=px(landmarks[i]);
    n===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
  });
  ctx.strokeStyle='rgba(255,255,255,0.18)';
  ctx.lineWidth=2;
  ctx.stroke();

  // Finger chains + glow
  for(const [name,chain] of Object.entries(FINGER_CHAINS)){
    const col=COLOR[name];
    ctx.shadowColor=col;ctx.shadowBlur=10;
    ctx.strokeStyle=col;ctx.lineWidth=3.5;
    ctx.beginPath();
    chain.forEach((i,n)=>{
      const p=px(landmarks[i]);
      n===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
    });
    ctx.stroke();

    // Joint dots
    chain.forEach((i,n)=>{
      const p=px(landmarks[i]);
      const isTip=n===chain.length-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,isTip?7:4,0,Math.PI*2);
      ctx.fillStyle=isTip?col:'#ffffff';
      ctx.shadowColor=col;ctx.shadowBlur=isTip?14:6;
      ctx.fill();
    });
  }

  // Wrist dot
  const wp=px(landmarks[L.WRIST]);
  ctx.beginPath();ctx.arc(wp.x,wp.y,9,0,Math.PI*2);
  ctx.fillStyle='#ffffff';ctx.shadowColor='#fff';ctx.shadowBlur=16;
  ctx.fill();

  // Angle badges on each finger shaft
  const badges=[
    {idx:L.I_MCP,tip:L.I_TIP,col:COLOR.index},
    {idx:L.M_MCP,tip:L.M_TIP,col:COLOR.middle},
    {idx:L.R_MCP,tip:L.R_TIP,col:COLOR.ring},
    {idx:L.P_MCP,tip:L.P_TIP,col:COLOR.pinky},
  ];

  ctx.shadowBlur=0;
  badges.forEach(({idx,tip,col})=>{
    const base=px(landmarks[idx]),tipP=px(landmarks[tip]);
    const mx=(base.x+tipP.x)/2,my=(base.y+tipP.y)/2;
    const ang=angle3(landmarks[L.WRIST],landmarks[idx],landmarks[tip]);
    const lbl=ang+'°';
    ctx.font='bold 12px SF Mono,Courier New,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const tw=ctx.measureText(lbl).width+14;
    // Badge BG
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath();
    ctx.roundRect(mx-tw/2,my-11,tw,22,6);
    ctx.fill();
    ctx.strokeStyle=col;ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.fillText(lbl,mx,my);
  });

  // Thumb shaft angle badge
  {
    const base=px(landmarks[L.T_MCP]),tipP=px(landmarks[L.T_TIP]);
    const mx=(base.x+tipP.x)/2,my=(base.y+tipP.y)/2;
    const ang=angle3(landmarks[L.T_CMC],landmarks[L.T_MCP],landmarks[L.T_IP]);
    const lbl=ang+'°';
    ctx.font='bold 12px SF Mono,Courier New,monospace';
    const tw=ctx.measureText(lbl).width+14;
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.beginPath();ctx.roundRect(mx-tw/2,my-11,tw,22,6);ctx.fill();
    ctx.strokeStyle=COLOR.thumb;ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#fff';ctx.fillText(lbl,mx,my);
  }

  ctx.restore();

  // Floating hand label (DOM – not mirrored by canvas transform)
  const rect=canvas.getBoundingClientRect();
  const scX=rect.width/canvas.width,scY=rect.height/canvas.height;
  // canvas is scaleX(-1), so DOM x = rect.right - wrist.x*scX
  const domX=rect.right-(landmarks[L.WRIST].x*canvas.width)*scX - 40;
  const domY=rect.top +(landmarks[L.WRIST].y*canvas.height)*scY + 14;
  handTag.style.left=domX+'px';
  handTag.style.top =domY+'px';
  handTag.style.display='block';
  handTag.textContent=handedness==='Left'?'右手':'左手'; // mirrored cam
}

// ── UI UPDATE ──────────────────────────────────────────────────────────────
function setText(id,v){ document.getElementById(id).textContent=v; }

function updatePanel(lm, handedness){
  // Thumb
  setText('t-cmc', angle3(lm[L.WRIST],lm[L.T_CMC],lm[L.T_MCP]));
  setText('t-mcp', angle3(lm[L.T_CMC],lm[L.T_MCP],lm[L.T_IP]));
  setText('t-ip',  angle3(lm[L.T_MCP],lm[L.T_IP], lm[L.T_TIP]));
  // Index
  setText('i-mcp', angle3(lm[L.WRIST], lm[L.I_MCP],lm[L.I_PIP]));
  setText('i-pip', angle3(lm[L.I_MCP], lm[L.I_PIP],lm[L.I_DIP]));
  setText('i-dip', angle3(lm[L.I_PIP], lm[L.I_DIP],lm[L.I_TIP]));
  // Middle
  setText('m-mcp', angle3(lm[L.WRIST], lm[L.M_MCP],lm[L.M_PIP]));
  setText('m-pip', angle3(lm[L.M_MCP], lm[L.M_PIP],lm[L.M_DIP]));
  setText('m-dip', angle3(lm[L.M_PIP], lm[L.M_DIP],lm[L.M_TIP]));
  // Ring
  setText('r-mcp', angle3(lm[L.WRIST], lm[L.R_MCP],lm[L.R_PIP]));
  setText('r-pip', angle3(lm[L.R_MCP], lm[L.R_PIP],lm[L.R_DIP]));
  setText('r-dip', angle3(lm[L.R_PIP], lm[L.R_DIP],lm[L.R_TIP]));
  // Pinky
  setText('p-mcp', angle3(lm[L.WRIST], lm[L.P_MCP],lm[L.P_PIP]));
  setText('p-pip', angle3(lm[L.P_MCP], lm[L.P_PIP],lm[L.P_DIP]));
  setText('p-dip', angle3(lm[L.P_PIP], lm[L.P_DIP],lm[L.P_TIP]));
  // Bottom stats
  setText('openness',  openness(lm)+'%');
  setText('wrist-ang', wristAng(lm[L.WRIST],lm[L.I_MCP])+'°');
  setText('sp-ti', spreadAng(lm[L.T_TIP],lm[L.I_TIP],lm[L.WRIST])+'°');
  setText('sp-im', spreadAng(lm[L.I_TIP],lm[L.M_TIP],lm[L.WRIST])+'°');
  setText('sp-mr', spreadAng(lm[L.M_TIP],lm[L.R_TIP],lm[L.WRIST])+'°');
  setText('sp-rp', spreadAng(lm[L.R_TIP],lm[L.P_TIP],lm[L.WRIST])+'°');
  // Gesture
  setText('gesture-name', gesture(lm));
}

function clearPanel(){
  ['t-cmc','t-mcp','t-ip',
   'i-mcp','i-pip','i-dip',
   'm-mcp','m-pip','m-dip',
   'r-mcp','r-pip','r-dip',
   'p-mcp','p-pip','p-dip'].forEach(id=>setText(id,'---'));
  setText('openness','--%');setText('wrist-ang','--°');
  ['sp-ti','sp-im','sp-mr','sp-rp'].forEach(id=>setText(id,'--°'));
  setText('gesture-name','---');
  handTag.style.display='none';
}

// ── DETECT LOOP ────────────────────────────────────────────────────────────
function loop(timestamp){
  rafId=requestAnimationFrame(loop);

  // Sync canvas size to video
  if(canvas.width!==video.videoWidth||canvas.height!==video.videoHeight){
    canvas.width=video.videoWidth||640;
    canvas.height=video.videoHeight||480;
  }

  // FPS
  const now=performance.now();
  const dt=now-lastT;lastT=now;
  fpsSmooth=fpsSmooth*.88+(1000/dt)*.12;
  setText('fps-num',Math.round(fpsSmooth));

  // Detect (only if new frame)
  if(video.readyState<2){ctx.clearRect(0,0,canvas.width,canvas.height);return;}

  let results;
  try{
    results=landmarker.detectForVideo(video,timestamp);
  }catch(e){return;}

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(results.landmarks&&results.landmarks.length>0){
    const lm=results.landmarks[0];                   // normalized 2D
    const hand=results.handedness[0][0].categoryName; // 'Left'|'Right'
    drawHand(lm,hand);
    updatePanel(lm,hand);
  }else{
    clearPanel();
  }
}

// ── SAVE SNAPSHOT ──────────────────────────────────────────────────────────
window.saveSnapshot=function(){
  // Composite: video + overlay on an offscreen canvas
  const off=document.createElement('canvas');
  off.width=canvas.width||640;
  off.height=canvas.height||480;
  const oc=off.getContext('2d');

  // Draw video (mirrored to match display)
  oc.save();
  oc.translate(off.width,0);oc.scale(-1,1);
  oc.drawImage(video,0,0,off.width,off.height);
  oc.restore();

  // Draw overlay (canvas is already mirrored in CSS, so draw mirrored here too)
  oc.save();
  oc.translate(off.width,0);oc.scale(-1,1);
  oc.drawImage(canvas,0,0,off.width,off.height);
  oc.restore();

  off.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='hand_'+Date.now()+'.png';
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),5000);

    // Toast
    const toast=document.getElementById('toast');
    toast.style.opacity='1';
    setTimeout(()=>toast.style.opacity='0',1800);
  },'image/png');
};

// ── START APP ──────────────────────────────────────────────────────────────
window.startApp=async function(){
  const startBtn=document.getElementById('start-btn');
  startBtn.disabled=true;startBtn.textContent='起動中…';
  loadMsg.style.display='block';

  // 1. Camera
  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},
      audio:false,
    });
  }catch(e){
    alert('カメラへのアクセスが拒否されました。\nブラウザの設定でカメラを許可してください。');
    startBtn.disabled=false;startBtn.textContent='カメラを起動';
    loadMsg.style.display='none';return;
  }
  video.srcObject=stream;
  await new Promise(r=>{video.onloadedmetadata=r;});
  await video.play();

  // 2. MediaPipe HandLandmarker (WASM)
  loadMsg.textContent='AIモデル読み込み中…（初回のみ時間がかかります）';
  try{
    const vision=await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    landmarker=await HandLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
        delegate:'GPU',  // falls back to CPU on unsupported devices
      },
      runningMode:'VIDEO',
      numHands:1,
      minHandDetectionConfidence:0.5,
      minHandPresenceConfidence:0.5,
      minTrackingConfidence:0.5,
    });
  }catch(e){
    alert('モデルの読み込みに失敗しました。\nインターネット接続を確認して再試行してください。\n'+e.message);
    startBtn.disabled=false;startBtn.textContent='カメラを起動';
    loadMsg.style.display='none';return;
  }

  // 3. Hide overlay, start loop
  overlayEl.style.display='none';
  loop(performance.now());
};
